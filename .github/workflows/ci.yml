name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders — real values live in Vercel. Any env var
          # read at module scope needs a placeholder here or the build fails.
          BETTER_AUTH_URL: http://localhost:3000
          BETTER_AUTH_SECRET: ci-placeholder-secret
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder
          SUPABASE_URL: https://placeholder.supabase.co
          # Added below to match the exact key used by your Supabase client
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          RESEND_API_KEY: re_placeholder
          AGORA_APP_ID: placeholder
          AGORA_APP_CERTIFICATE: placeholder
          CRON_SECRET: placeholder